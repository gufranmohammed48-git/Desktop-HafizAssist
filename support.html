<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Support — HifzAssist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A1220;
    --panel: #101A2C;
    --card: #131F33;
    --card-hover: #182640;
    --border: rgba(255,255,255,0.08);
    --text: #E8EDF4;
    --text-dim: #8A96A8;
    --green: #2ECC71;
    --green-soft: rgba(46,204,113,0.14);
    --purple: #B57EDC;
    --purple-soft: rgba(181,126,220,0.14);
    --accent: #B57EDC;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at top,rgba(181,126,220,.08) 0%,transparent 60%);background-attachment:fixed}
  .app{max-width:780px;margin:0 auto;padding:24px}

  .back-link{
    display:inline-flex;align-items:center;gap:6px;
    color:var(--text-dim);text-decoration:none;
    font-size:13px;font-weight:500;
    margin-bottom:24px;transition:color .15s ease;
  }
  .back-link:hover{color:var(--accent)}
  .back-link .arrow{font-size:16px;line-height:1}

  .support-header{text-align:center;margin:8px 0 28px}
  .support-header .icon{
    width:64px;height:64px;margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--accent) 0%,#9C6AD3 100%);
    border-radius:18px;font-size:32px;
    box-shadow:0 8px 24px rgba(181,126,220,.35);
  }
  .support-header h1{margin:0 0 8px;font-size:28px;font-weight:700;letter-spacing:-.3px}
  .support-header .lede{margin:0;color:var(--text-dim);font-size:14px;line-height:1.6;max-width:520px;margin:0 auto}
  .bismillah{
    display:block;width:100%;max-width:560px;height:auto;
    margin:0 auto;filter:drop-shadow(0 4px 18px rgba(46,204,113,.25));
  }

  .form-panel{
    background:var(--panel);border:1px solid var(--border);
    border-radius:16px;padding:16px;
    box-shadow:0 4px 20px rgba(0,0,0,.25);
    overflow:hidden;
  }
  .form-panel iframe{
    display:block;width:100%;
    border:0;border-radius:10px;
    background:#fff;
  }

  .meta{
    margin-top:24px;text-align:center;
    color:var(--text-dim);font-size:12px;line-height:1.6;
  }
  .meta a{color:var(--accent);text-decoration:none}
  .meta a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="app">
  <a class="back-link" href="index.html"><span class="arrow">←</span> Back to app</a>

  <div class="support-header">
    <img class="bismillah" src="assets/bismillah.png" alt="Bismillah ir-Rahman ir-Raheem">
  </div>

  <!-- Embedded Google Form. To change which form is shown, edit the src URL.
       Current form ID: 1FAIpQLScSSIYxlRbuN6gofwRA2J69Ucueqnl14LVZIv0vjnpIvtHXUA
       Edit your form at:
         https://docs.google.com/forms/d/1FAIpQLScSSIYxlRbuN6gofwRA2J69Ucueqnl14LVZIv0vjnpIvtHXUA/edit
       The form has: Feedback Type (Comments / Questions / Bug Reports /
       Feature Request / Feedback / Suggestions), Comments, Name, Email. -->
  <div class="form-panel">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLScSSIYxlRbuN6gofwRA2J69Ucueqnl14LVZIv0vjnpIvtHXUA/viewform?embedded=true"
      width="100%"
      height="1400"
      title="HifzAssist Contact Form"
      loading="lazy">
      Loading…
    </iframe>
  </div>

  <div class="meta">
    Powered by Google Forms
  </div>
</div>

</body>
</html>
